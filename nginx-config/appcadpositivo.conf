# Configuração Nginx para AppCadPositivo
# /etc/nginx/sites-available/appcadpositivo

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream para o FastAPI
upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirecionamento HTTP -> HTTPS
server {
    listen 80;
    server_name cert.psmais.com.br;
    
    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    server_name cert.psmais.com.br;
    
    # Logs
    access_log /var/log/nginx/appcadpositivo_access.log;
    error_log /var/log/nginx/appcadpositivo_error.log;
    
    # SSL Configuration (autoassinado local)
    ssl_certificate /etc/nginx/ssl/cert_psmais_com_br.crt;
    ssl_certificate_key /etc/nginx/ssl/cert_psmais_com_br.key;
    ssl_trusted_certificate /etc/nginx/ssl/cert_psmais_com_br.crt;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Client max body size (para uploads)
    client_max_body_size 50M;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;
    
    # Arquivos estáticos (servidos diretamente pelo Nginx)
    location /assets/ {
        alias /opt/AppCadPositivo/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
        
        # Compressão para assets
        location ~* \.(js|css)$ {
            gzip_static on;
        }
    }
    
    # Arquivos de imagem e favicon
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        root /opt/AppCadPositivo/dist;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # Arquivos de usuário (com autenticação através do backend)
    location /arquivos/ {
        # Rate limiting para downloads
        limit_req zone=api burst=20 nodelay;
        
        # Proxy para o backend
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para downloads grandes
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Login endpoint (rate limiting mais restritivo)
    location /login {
        limit_req zone=login burst=5 nodelay;
        
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Documentação da API
    location ~ ^/(docs|redoc|openapi.json) {
        # Opcional: restringir acesso por IP
        # allow 192.168.1.0/24;
        # deny all;
        
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Todas as outras rotas da API
    location ~ ^/(register|me|dados|users|admin|relatorio_bi) {
        limit_req zone=api burst=10 nodelay;
        
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_Set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
    
    # Frontend SPA (React) - deve ser a última regra
    location / {
        # Primeiro tenta servir o arquivo, depois fallback para index.html (SPA)
        try_files $uri $uri/ @fallback;
        
        root /opt/AppCadPositivo/dist;
        index index.html;
        
        # Cache para HTML
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Fallback para SPA (Single Page Application)
    location @fallback {
        root /opt/AppCadPositivo/dist;
        try_files /index.html =404;
    }
    
    # Bloquear arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
